<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agenda Digital</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Barbearia Online</h1>
  <p>Seu site de barbearia pronto em 1 minuto</p>
  <form id="form">
    <input type="text" id="nome" placeholder="Seu nome" required>
    <input type="text" id="salao" placeholder="Nome do salão" required>
    <input type="text" id="numero" placeholder="WhatsApp (ex: 81999999999)" required>
    <input type="email" id="email" placeholder="Seu email" required>
    <button type="submit">Solicitar</button>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
